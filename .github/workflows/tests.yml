name: Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php-version }} Tests
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3']
        
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: nws_cad_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u test_user -ptest_pass --silent"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=5
          --health-start-period=30s

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, xml, simplexml
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Static analysis (PHPStan)
        run: composer phpstan

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL to be ready..."
          max_attempts=30
          attempt=0
          until mysqladmin ping -h 127.0.0.1 -u test_user -ptest_pass --silent; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::MySQL failed to become ready after $max_attempts attempts"
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts: Waiting for MySQL..."
            sleep 2
          done
          echo "::notice::MySQL is ready and accepting connections"

      - name: Create database schema
        run: |
          echo "Creating database schema..."
          max_attempts=3
          attempt=0
          until mysql -h 127.0.0.1 -u test_user -ptest_pass nws_cad_test < database/schema.sql; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Failed to create database schema after $max_attempts attempts"
              exit 1
            fi
            echo "::warning::Schema creation attempt $attempt failed, retrying..."
            sleep 3
          done
          echo "::notice::Database schema created successfully"

      - name: Run Unit Tests
        run: composer run-script test:unit
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          # tests/bootstrap.php treats MYSQL_DATABASE as the production name and
          # redirects to MYSQL_TEST_DATABASE before any DELETE runs. Set them
          # to different values so the safety check passes; the actual MySQL
          # service only has nws_cad_test created.
          MYSQL_DATABASE: nws_cad
          MYSQL_TEST_DATABASE: nws_cad_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass

      - name: Run Integration Tests
        run: composer run-script test:integration
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: nws_cad
          MYSQL_TEST_DATABASE: nws_cad_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass

      - name: Run Performance Tests
        id: perf-tests
        run: |
          echo "::notice::Running performance tests (allowed to fail)"
          if ! composer run-script test:performance; then
            echo "::warning::Performance tests failed - this is non-blocking but should be investigated"
            echo "PERF_TESTS_FAILED=true" >> $GITHUB_ENV
          else
            echo "::notice::Performance tests passed"
            echo "PERF_TESTS_FAILED=false" >> $GITHUB_ENV
          fi
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: nws_cad
          MYSQL_TEST_DATABASE: nws_cad_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        continue-on-error: true

      - name: Run Security Tests
        run: composer run-script test:security
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: nws_cad
          MYSQL_TEST_DATABASE: nws_cad_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass

      - name: Run All Tests with Coverage
        run: composer run-script test:coverage
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_DATABASE: nws_cad
          MYSQL_TEST_DATABASE: nws_cad_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass

      - name: Check code coverage
        run: |
          if [ -f coverage/clover.xml ]; then
            COVERAGE=$(php -r "
              \$xml = simplexml_load_file('coverage/clover.xml');
              \$metrics = \$xml->project->metrics;
              \$elements = (int)\$metrics['elements'];
              \$coveredElements = (int)\$metrics['coveredelements'];
              \$coverage = (\$elements > 0) ? (\$coveredElements / \$elements) * 100 : 0;
              echo number_format(\$coverage, 2);
            ")
            echo "Code Coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "::warning::Code coverage is $COVERAGE% which is below the 80% threshold"
              echo "COVERAGE_BELOW_THRESHOLD=true" >> $GITHUB_ENV
            else
              echo "::notice::Code coverage is $COVERAGE% which meets the 80% threshold"
              echo "COVERAGE_BELOW_THRESHOLD=false" >> $GITHUB_ENV
            fi
          else
            echo "::warning::Coverage report not found"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Code Style Check
        run: |
          # Surface only files with syntax errors. grep -v exits 1 when all
          # files pass (no matching lines); we explicitly succeed in that case.
          find src -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" || true
        continue-on-error: true

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          if [ "$PERF_TESTS_FAILED" = "true" ]; then
            echo "| Performance Tests | ⚠️  Warning (Non-blocking) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Performance Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Security Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$COVERAGE_BELOW_THRESHOLD" = "true" ]; then
            echo "⚠️  **Warning:** Code coverage is below 80% threshold" >> $GITHUB_STEP_SUMMARY
          fi

  # PostgreSQL job: exercises the pgsql driver paths (parser UPSERT branches,
  # DbHelper dialect switches) that the MySQL job never runs. Non-blocking
  # (continue-on-error) until the pgsql suite is fully green — see #48. The
  # importer characterization suite already passes on both drivers; the rest
  # is being brought up incrementally.
  test-postgres:
    name: PostgreSQL ${{ matrix.php-version }} Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nws_cad_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_pgsql, xml, simplexml
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          max_attempts=30
          attempt=0
          until pg_isready -h 127.0.0.1 -U test_user; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::PostgreSQL failed to become ready after $max_attempts attempts"
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts: Waiting for PostgreSQL..."
            sleep 2
          done
          echo "::notice::PostgreSQL is ready and accepting connections"

      - name: Create database schema
        env:
          PGPASSWORD: test_pass
        run: |
          echo "Loading PostgreSQL schema into nws_cad_test..."
          psql -h 127.0.0.1 -U test_user -d nws_cad_test -v ON_ERROR_STOP=1 -f database/postgres/init.sql
          echo "::notice::PostgreSQL schema created successfully"

      - name: Run Unit Tests
        run: composer run-script test:unit
        env:
          DB_TYPE: pgsql
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          # bootstrap.php treats POSTGRES_DB as the production name and redirects
          # to POSTGRES_TEST_DATABASE before any TRUNCATE runs. Distinct values
          # satisfy the safety guard; only nws_cad_test actually exists.
          POSTGRES_DB: nws_cad
          POSTGRES_TEST_DATABASE: nws_cad_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass

      - name: Run Integration Tests
        run: composer run-script test:integration
        env:
          DB_TYPE: pgsql
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DB: nws_cad
          POSTGRES_TEST_DATABASE: nws_cad_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass

      - name: Run Security Tests
        run: composer run-script test:security
        env:
          DB_TYPE: pgsql
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DB: nws_cad
          POSTGRES_TEST_DATABASE: nws_cad_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
