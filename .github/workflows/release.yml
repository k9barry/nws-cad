name: Release

# Conventional-commit driven semantic releases.
#
# Bump policy (documented in CLAUDE.md "PR merge protocol"):
#   feat:                               -> minor
#   fix: / perf: / refactor: / revert:  -> patch
#   type! / "BREAKING CHANGE:" footer   -> major
#   chore: / docs: / test: / ci: / style: / build: -> no release
#   non-conventional subject            -> patch (with a workflow warning)
#
# The latest v* tag is the source of truth for the current version; the
# VERSION file is derived output written at release time. Self-retrigger
# is prevented three independent ways:
#   1. pushes use GITHUB_TOKEN, which GitHub never triggers workflows from
#   2. the release commit subject ("chore(release): ...") classifies as
#      no-release even if a PAT is ever substituted
#   3. the release commit carries [skip ci]

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_bump:
        description: 'Override bump detection'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      dry_run:
        description: 'Compute and print the bump/notes without releasing'
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version bump from commits
        id: detect
        env:
          FORCE_BUMP: ${{ github.event.inputs.force_bump || 'auto' }}
        run: |
          set -euo pipefail

          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="$LAST_TAG..HEAD"
            BASE="${LAST_TAG#v}"
          else
            RANGE="HEAD"
            BASE=$(cat VERSION 2>/dev/null || echo "0.0.0")
          fi
          echo "Last tag: ${LAST_TAG:-<none>} (base version $BASE)"

          BUMP=0   # 0=none 1=patch 2=minor 3=major
          BREAKING=""; FEATURES=""; FIXES=""; PERF=""; REFACTOR=""

          raise() {
            if [ "$1" -gt "$BUMP" ]; then BUMP="$1"; fi
          }

          # tformat (not format) terminates every entry with \n so the
          # final commit is not dropped by the read loop.
          while IFS=$'\t' read -r HASH SUBJECT; do
            if [ -z "$HASH" ]; then continue; fi
            SHORT=$(git rev-parse --short "$HASH")

            # Release commits never trigger releases (guard 2).
            case "$SUBJECT" in
              'chore(release):'*|'Release v'*) continue ;;
            esac

            BODY=$(git log -1 --pretty=%b "$HASH")
            TYPE=$(printf '%s' "$SUBJECT" | sed -nE 's/^([a-z]+)(\([^)]*\))?!?:.*/\1/p')

            if printf '%s' "$SUBJECT" | grep -qE '^[a-z]+(\([^)]*\))?!:' \
               || printf '%s' "$BODY" | grep -qE '^BREAKING[- ]CHANGE:'; then
              raise 3
              BREAKING="${BREAKING}- ${SUBJECT} (${SHORT})"$'\n'
              continue
            fi

            case "$TYPE" in
              feat)
                raise 2
                FEATURES="${FEATURES}- ${SUBJECT} (${SHORT})"$'\n' ;;
              fix)
                raise 1
                FIXES="${FIXES}- ${SUBJECT} (${SHORT})"$'\n' ;;
              perf)
                raise 1
                PERF="${PERF}- ${SUBJECT} (${SHORT})"$'\n' ;;
              refactor|revert)
                raise 1
                REFACTOR="${REFACTOR}- ${SUBJECT} (${SHORT})"$'\n' ;;
              chore|docs|test|tests|ci|style|build)
                : ;;
              *)
                echo "::warning::Non-conventional commit subject: '${SUBJECT}' - counted as patch"
                raise 1
                FIXES="${FIXES}- ${SUBJECT} (${SHORT})"$'\n' ;;
            esac
          done < <(git log "$RANGE" --no-merges --pretty=tformat:'%H%x09%s')

          case "$FORCE_BUMP" in
            patch) BUMP=1 ;;
            minor) BUMP=2 ;;
            major) BUMP=3 ;;
          esac

          if [ "$BUMP" -eq 0 ]; then
            echo "No releasable commits since ${LAST_TAG:-repository start} - skipping release."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "$BUMP" in
            3) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            2) MINOR=$((MINOR + 1)); PATCH=0 ;;
            1) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Computed bump level $BUMP -> v$VERSION"

          NOTES="$RUNNER_TEMP/release-notes.md"
          : > "$NOTES"
          if [ -n "$BREAKING" ]; then printf '## Breaking Changes\n\n%s\n' "$BREAKING" >> "$NOTES"; fi
          if [ -n "$FEATURES" ]; then printf '## Features\n\n%s\n' "$FEATURES" >> "$NOTES"; fi
          if [ -n "$FIXES" ]; then printf '## Fixes\n\n%s\n' "$FIXES" >> "$NOTES"; fi
          if [ -n "$PERF" ]; then printf '## Performance\n\n%s\n' "$PERF" >> "$NOTES"; fi
          if [ -n "$REFACTOR" ]; then printf '## Refactoring\n\n%s\n' "$REFACTOR" >> "$NOTES"; fi

          echo "--- release notes ---"
          cat "$NOTES"

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update VERSION and CHANGELOG
        if: steps.detect.outputs.bump != 'none' && github.event.inputs.dry_run != 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          set -euo pipefail
          echo "$VERSION" > VERSION

          DATE=$(date +%Y-%m-%d)
          ENTRY_FILE="$RUNNER_TEMP/changelog-entry.md"
          {
            printf '## [%s] - %s\n\n' "$VERSION" "$DATE"
            cat "$RUNNER_TEMP/release-notes.md"
          } > "$ENTRY_FILE"

          # Insert the entry just below the "# Changelog" header. Entry
          # content is read from a file (not a -v var) so multi-line
          # markdown never fights awk or YAML block-scalar indentation.
          if [ -f CHANGELOG.md ]; then
            TMP=$(mktemp)
            awk -v entry_file="$ENTRY_FILE" '
              !inserted && /^# Changelog/ {
                print; print "";
                while ((getline line < entry_file) > 0) print line;
                inserted=1; next
              }
              { print }
            ' CHANGELOG.md > "$TMP"
            mv "$TMP" CHANGELOG.md
          else
            {
              printf '# Changelog\n\n'
              printf 'All notable changes to this project will be documented in this file.\n\n'
              cat "$ENTRY_FILE"
            } > CHANGELOG.md
          fi

      - name: Commit, tag, and push
        if: steps.detect.outputs.bump != 'none' && github.event.inputs.dry_run != 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git commit -m "chore(release): v$VERSION [skip ci]"
          git push origin main
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: steps.detect.outputs.bump != 'none' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
