# Shared container-log rotation caps so a chatty/looping service can't fill the
# host disk. Applied to every service via the *default-logging alias.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # PHP Application Service (File Watcher)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        TZ: ${TZ:-UTC}
    container_name: nws-cad-app
    restart: unless-stopped
    # Restarted by the `autoheal` service when the healthcheck below flips to
    # unhealthy (e.g. watcher heartbeat goes stale but the process lingers).
    labels:
      - autoheal=true
    logging: *default-logging
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ${NWS_VAR_DIR:-./var}/log:/var/www/var/log
      # Watch source is the CIFS watchfolder volume (production). Do NOT add a
      # second host bind at the same target — it would shadow (or be shadowed
      # by) the CIFS mount. For local dev without CIFS, files in ./var/watch are
      # already visible via the ./:/var/www mount above.
      - watchfolder:/var/www/var/watch
    environment:
      - TZ=${TZ:-UTC}
      - DB_TYPE=${DB_TYPE:-mysql}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nws_cad}
      - MYSQL_USER=${MYSQL_USER:-nws_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-nws_cad}
      - POSTGRES_USER=${POSTGRES_USER:-nws_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - WATCHER_INTERVAL=${WATCHER_INTERVAL:-5}
      - WATCHER_FILE_PATTERN=${WATCHER_FILE_PATTERN:-*.xml}
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    networks:
      - nws-cad-network
    command: >
      sh -c "composer install --no-interaction --prefer-dist --optimize-autoloader &&
             php /var/www/src/watcher.php"
    healthcheck:
      test: ["CMD-SHELL", "test $(($(date +%s) - $(stat -c %Y /var/www/var/log/.watcher-heartbeat 2>/dev/null || echo 0))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 60s

  # PHP API Service
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        TZ: ${TZ:-UTC}
    container_name: nws-cad-api
    restart: unless-stopped
    labels:
      - autoheal=true
    logging: *default-logging
    # BIND_ADDR defaults to 0.0.0.0 (all interfaces, unchanged from prior
    # releases). Set BIND_ADDR=127.0.0.1 in .env to publish loopback-only so
    # only a co-located reverse proxy can reach the API (see
    # docs/deployment/README.md — the app-level TrustedProxy guard still runs
    # regardless).
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${API_PORT:-8080}:8080"
    volumes:
      - ./public:/var/www/public
      - ./src:/var/www/src
      - ./vendor:/var/www/vendor
      - ./.env:/var/www/.env
    environment:
      - TZ=${TZ:-UTC}
    command: php -S 0.0.0.0:8080 -t /var/www/public /var/www/public/router.php
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    networks:
      - nws-cad-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s

  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: nws-cad-mysql
    restart: unless-stopped
    labels:
      - autoheal=true
    logging: *default-logging
    profiles:
      - mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nws_cad}
      MYSQL_USER: ${MYSQL_USER:-nws_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${NWS_VAR_DIR:-./var}/data/mysql:/var/lib/mysql
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      # The nws_cad_test DB + test_user are NOT seeded here — that scaffolding
      # must never land on a production MySQL. For local testing, opt in with the
      # override: docker compose -f docker-compose.yml -f docker-compose.test.yml \
      #   --profile mysql up -d   (see docker-compose.test.yml / docs/TESTING.md).
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    # Set BIND_ADDR=127.0.0.1 in .env to stop exposing the DB port on all host
    # interfaces (recommended for production).
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${MYSQL_PORT:-3306}:3306"
    networks:
      - nws-cad-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database Service
  postgres:
    image: postgres:16
    container_name: nws-cad-postgres
    restart: unless-stopped
    labels:
      - autoheal=true
    logging: *default-logging
    profiles:
      - pgsql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nws_cad}
      POSTGRES_USER: ${POSTGRES_USER:-nws_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${NWS_VAR_DIR:-./var}/data/postgres:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Set BIND_ADDR=127.0.0.1 in .env to stop exposing the DB port on all host
    # interfaces (recommended for production).
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    networks:
      - nws-cad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nws_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dozzle - Real-time Docker Log Viewer
  # SECURITY NOTE: Dozzle exposes Docker container logs over HTTP.
  # - Reads /var/run/docker.sock read-only.
  # - Authentication uses Dozzle's "simple" provider with users defined in
  #   docker/dozzle/users.yml (bcrypt-hashed; gitignored). Regenerate via:
  #     docker run --rm amir20/dozzle:latest generate <user> --password <pw> \
  #       --name <display> --email <email> > docker/dozzle/users.yml
  # - The legacy DOZZLE_USERNAME / DOZZLE_PASSWORD env vars are NOT supported
  #   in Dozzle v7+; they are silently ignored if set.
  # - Do not expose DOZZLE_PORT to the public internet without TLS in front.
  dozzle:
    image: amir20/dozzle:latest
    container_name: nws-cad-dozzle
    restart: unless-stopped
    logging: *default-logging
    # Dozzle exposes container logs — keep it loopback-only in production by
    # setting BIND_ADDR=127.0.0.1 (reach it via the reverse proxy / SSH tunnel).
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${DOZZLE_PORT:-8081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/dozzle/users.yml:/data/users.yml:ro
    environment:
      - TZ=${TZ:-UTC}
      - DOZZLE_LEVEL=${LOG_LEVEL:-info}
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_AUTH_PROVIDER=simple
    networks:
      - nws-cad-network
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 3s
      timeout: 30s
      retries: 5
      start_period: 30s

  # Autoheal — restarts any container labeled `autoheal=true` when Docker
  # reports its healthcheck as unhealthy. `restart: unless-stopped` only reacts
  # to a *process exit*; this covers the case where a process lingers but its
  # healthcheck fails (a wedged watcher whose heartbeat goes stale, or a DB
  # whose ping fails while the daemon hangs). Watches labels only — no profile,
  # so it runs for both mysql and pgsql deployments.
  autoheal:
    # Pinned (not :latest) for reproducible deploys. This container has RW access
    # to the Docker socket (required to issue restarts — see the volume note
    # below), so it is highly privileged; pinning avoids silently pulling a
    # changed upstream image. Bump deliberately; optionally add an @sha256 digest.
    image: willfarrell/autoheal:1.2.0
    container_name: nws-cad-autoheal
    restart: unless-stopped
    logging: *default-logging
    environment:
      - TZ=${TZ:-UTC}
      # Only touch containers we explicitly opted in via `autoheal=true`.
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      # Poll interval (seconds) for checking container health.
      - AUTOHEAL_INTERVAL=${AUTOHEAL_INTERVAL:-10}
      # Grace window after a container starts before it's eligible for a restart.
      - AUTOHEAL_START_PERIOD=${AUTOHEAL_START_PERIOD:-60}
      # Give the container a clean stop before SIGKILL.
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=${AUTOHEAL_DEFAULT_STOP_TIMEOUT:-30}
    volumes:
      # Needs the Docker API to issue restarts (read-write, unlike Dozzle).
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nws-cad-network

networks:
  nws-cad-network:
    driver: bridge

volumes:
  watchfolder:
    driver_opts:
      type: cifs
      # uid/gid=33 is www-data in the php image. The containers now run as
      # www-data (non-root), so the CIFS mount must be owned by it for the
      # watcher to read files and rename them into processed/ and failed/.
      o: "username=${CIFS_USERNAME},password=${CIFS_PASSWORD},domain=${CIFS_DOMAIN},uid=33,gid=33,file_mode=0664,dir_mode=0775"
      device: ${SHARED_FOLDER_PATH}
