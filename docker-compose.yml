services:
  # PHP Application Service (File Watcher)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        TZ: ${TZ:-UTC}
    container_name: nws-cad-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ${NWS_VAR_DIR:-./var}/log:/var/www/var/log
      # Watch source is the CIFS watchfolder volume (production). Do NOT add a
      # second host bind at the same target — it would shadow (or be shadowed
      # by) the CIFS mount. For local dev without CIFS, files in ./var/watch are
      # already visible via the ./:/var/www mount above.
      - watchfolder:/var/www/var/watch
    environment:
      - TZ=${TZ:-UTC}
      - DB_TYPE=${DB_TYPE:-mysql}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nws_cad}
      - MYSQL_USER=${MYSQL_USER:-nws_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-nws_cad}
      - POSTGRES_USER=${POSTGRES_USER:-nws_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - WATCHER_INTERVAL=${WATCHER_INTERVAL:-5}
      - WATCHER_FILE_PATTERN=${WATCHER_FILE_PATTERN:-*.xml}
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    networks:
      - nws-cad-network
    command: >
      sh -c "composer install --no-interaction --prefer-dist --optimize-autoloader &&
             php /var/www/src/watcher.php"
    healthcheck:
      test: ["CMD-SHELL", "test $(($(date +%s) - $(stat -c %Y /var/www/var/log/.watcher-heartbeat 2>/dev/null || echo 0))) -lt 60"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 60s

  # PHP API Service
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        TZ: ${TZ:-UTC}
    container_name: nws-cad-api
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./public:/var/www/public
      - ./src:/var/www/src
      - ./vendor:/var/www/vendor
      - ./.env:/var/www/.env
    environment:
      - TZ=${TZ:-UTC}
    command: php -S 0.0.0.0:8080 -t /var/www/public /var/www/public/router.php
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    networks:
      - nws-cad-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s

  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: nws-cad-mysql
    restart: unless-stopped
    profiles:
      - mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nws_cad}
      MYSQL_USER: ${MYSQL_USER:-nws_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${NWS_VAR_DIR:-./var}/data/mysql:/var/lib/mysql
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/mysql/test-setup.sql:/docker-entrypoint-initdb.d/zz-test-setup.sql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - nws-cad-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database Service
  postgres:
    image: postgres:16
    container_name: nws-cad-postgres
    restart: unless-stopped
    profiles:
      - pgsql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nws_cad}
      POSTGRES_USER: ${POSTGRES_USER:-nws_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${NWS_VAR_DIR:-./var}/data/postgres:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - nws-cad-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nws_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dozzle - Real-time Docker Log Viewer
  # SECURITY NOTE: Dozzle exposes Docker container logs over HTTP.
  # - Reads /var/run/docker.sock read-only.
  # - Authentication uses Dozzle's "simple" provider with users defined in
  #   docker/dozzle/users.yml (bcrypt-hashed; gitignored). Regenerate via:
  #     docker run --rm amir20/dozzle:latest generate <user> --password <pw> \
  #       --name <display> --email <email> > docker/dozzle/users.yml
  # - The legacy DOZZLE_USERNAME / DOZZLE_PASSWORD env vars are NOT supported
  #   in Dozzle v7+; they are silently ignored if set.
  # - Do not expose DOZZLE_PORT to the public internet without TLS in front.
  dozzle:
    image: amir20/dozzle:latest
    container_name: nws-cad-dozzle
    restart: unless-stopped
    ports:
      - "${DOZZLE_PORT:-8081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/dozzle/users.yml:/data/users.yml:ro
    environment:
      - TZ=${TZ:-UTC}
      - DOZZLE_LEVEL=${LOG_LEVEL:-info}
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_AUTH_PROVIDER=simple
    networks:
      - nws-cad-network
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 3s
      timeout: 30s
      retries: 5
      start_period: 30s

networks:
  nws-cad-network:
    driver: bridge

volumes:
  watchfolder:
    driver_opts:
      type: cifs
      # uid/gid=33 is www-data in the php image. The containers now run as
      # www-data (non-root), so the CIFS mount must be owned by it for the
      # watcher to read files and rename them into processed/ and failed/.
      o: "username=${CIFS_USERNAME},password=${CIFS_PASSWORD},domain=${CIFS_DOMAIN},uid=33,gid=33,file_mode=0664,dir_mode=0775"
      device: ${SHARED_FOLDER_PATH}
